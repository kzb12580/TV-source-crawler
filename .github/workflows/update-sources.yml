name: Update Sources

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run crawler
        run: python crawler.py
        
      - name: Get stats
        id: stats
        run: |
          TOTAL=$(python3 -c "import json; d=json.load(open('sources.json')); print(d.get('total_sources', 0))")
          AVAILABLE=$(python3 -c "import json; d=json.load(open('sources.json')); print(d.get('total_available', 0))")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "available=$AVAILABLE" >> $GITHUB_OUTPUT
          echo "Total: $TOTAL, Available: $AVAILABLE"
          
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update sources - $(date '+%Y-%m-%d')"
          git push
